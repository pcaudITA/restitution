<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>restitution.pcaudit.tech</title>
<meta name="description" content="Antes de devolver un dispositivo en leasing: elige tu dispositivo y confirma, paso a paso, que está libre de bloqueos, datos y cuentas. Trilingüe ES/EN/IT.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg-primary:#f8fafc; --bg-secondary:#fff; --bg-tertiary:#f1f5f9;
  --text-primary:#0f172a; --text-secondary:#475569; --text-muted:#94a3b8;
  --border-color:#cbd5e1; --border-focus:#3b82f6;
  --accent-primary:#3b82f6; --accent-sender:#ef4444; --accent-carrier:#10b981; --accent-warning:#f59e0b;
  --warm:#f472b6;
  --card-shadow:0 4px 6px -1px rgb(0 0 0 / .05),0 2px 4px -2px rgb(0 0 0 / .05);
  --glass-bg:rgba(255,255,255,.7); --glass-border:rgba(255,255,255,.5); --glass-blur:12px;
}
[data-theme="dark"]{
  --bg-primary:#0f172a; --bg-secondary:#1e293b; --bg-tertiary:#334155;
  --text-primary:#f8fafc; --text-secondary:#cbd5e1; --text-muted:#64748b;
  --border-color:#475569; --border-focus:#60a5fa;
  --accent-primary:#60a5fa; --accent-sender:#f87171; --accent-carrier:#34d399; --accent-warning:#fbbf24;
  --warm:#f9a8d4;
  --card-shadow:0 10px 15px -3px rgb(0 0 0 / .3),0 4px 6px -4px rgb(0 0 0 / .3);
  --glass-bg:rgba(30,41,59,.7); --glass-border:rgba(255,255,255,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;transition:background-color .3s,color .3s}
a{color:var(--accent-primary);text-decoration:none}
a:hover{text-decoration:underline}

header{position:sticky;top:0;z-index:100;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-bottom:1px solid var(--glass-border);padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:var(--card-shadow)}
.logo{display:flex;align-items:center;text-decoration:none}
.brand-logo{height:26px;width:auto;display:block}
[data-theme="dark"] .brand-logo{filter:invert(1)}
.nav-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.btn{font-family:inherit;font-size:.82rem;font-weight:600;padding:.42rem .8rem;border-radius:.5rem;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .2s}
.btn:hover{background:var(--bg-tertiary);border-color:var(--text-muted)}
.btn-primary{background:var(--accent-primary);color:#fff;border-color:var(--accent-primary)}
.lang-group{display:flex;gap:.25rem;border:1px solid var(--border-color);border-radius:.6rem;padding:.2rem;background:var(--bg-secondary)}
.lang-group .btn{border:none;padding:.32rem .6rem}
.btn-icon{padding:.45rem;border-radius:50%;aspect-ratio:1;font-size:.95rem;line-height:1}

main{max-width:760px;margin:0 auto;padding:1.5rem 1.1rem 4rem}

.hero{text-align:center;margin:1.5rem 0 .5rem}
.hero .heart{width:54px;height:54px;color:var(--warm);margin:0 auto .6rem;display:block}
.hero h1{font-size:1.9rem;font-weight:700;letter-spacing:-.01em}
.hero p.lead{color:var(--text-secondary);margin:.6rem auto 0;max-width:54ch;font-size:1.05rem}

.intro-card{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:1rem;box-shadow:var(--card-shadow);padding:1.4rem 1.5rem;margin:1.5rem 0}
.intro-card p{font-size:.96rem;color:var(--text-secondary);margin:.7rem 0}
.intro-card p:first-child{margin-top:0}
.intro-card .why{background:var(--bg-tertiary);border-left:4px solid var(--accent-warning);border-radius:.6rem;padding:.7rem .9rem;color:var(--text-secondary)}
.intro-card b{color:var(--text-primary);font-weight:600}
.start-row{text-align:center;margin:1.6rem 0 .5rem}
.start-btn{font-size:1.05rem;font-weight:700;padding:.85rem 2.4rem;border-radius:.8rem;border:none;color:#fff;cursor:pointer;background:linear-gradient(90deg,var(--warm),var(--accent-primary));box-shadow:var(--card-shadow);transition:transform .12s,filter .2s}
.start-btn:hover{filter:brightness(1.05)}
.start-btn:active{transform:scale(.98)}
.start-hint{font-size:.82rem;color:var(--text-muted);margin-top:.7rem}

/* selection screens */
.screen-head{display:flex;align-items:center;gap:.6rem;margin:.4rem 0 .8rem}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:inherit;font-size:.85rem;font-weight:600;color:var(--text-secondary);background:none;border:none;cursor:pointer;padding:.3rem .2rem}
.back-btn:hover{color:var(--text-primary)}
.back-btn svg{width:16px;height:16px}
.screen-title{font-size:1.5rem;font-weight:700;letter-spacing:-.01em;text-align:center;margin-top:.3rem}
.screen-sub{color:var(--text-secondary);text-align:center;margin:.45rem auto 1.4rem;max-width:46ch;font-size:.98rem}
.choice-grid{display:flex;flex-direction:column;gap:.8rem;max-width:520px;margin:0 auto}
.choice{display:flex;align-items:center;gap:1rem;text-align:left;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:1rem;box-shadow:var(--card-shadow);padding:1.05rem 1.2rem;cursor:pointer;font-family:inherit;color:var(--text-primary);transition:border-color .2s,transform .12s,background .2s}
.choice:hover{border-color:var(--warm);background:var(--bg-tertiary)}
.choice:active{transform:scale(.99)}
.choice-ic{flex-shrink:0;width:46px;height:46px;border-radius:.8rem;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;color:var(--accent-primary)}
.choice-ic svg{width:26px;height:26px}
.choice-tx{flex:1;display:flex;flex-direction:column}
.choice-tx b{font-size:1.02rem;font-weight:600}
.choice-tx small{font-size:.82rem;color:var(--text-muted)}
.choice-arrow{color:var(--text-muted);display:flex}
.choice-arrow svg{width:18px;height:18px}

/* help chooser */
.help-card{background:var(--bg-secondary);border:1px dashed var(--border-color);border-radius:1rem;padding:1rem 1.2rem;margin:.4rem 0 1.2rem}
.help-card .h-title{font-size:.92rem;font-weight:600;display:flex;align-items:center;gap:.45rem}
.help-card .h-title svg{width:18px;height:18px;color:var(--accent-primary)}
.help-card .h-sub{font-size:.82rem;color:var(--text-muted);margin:.25rem 0 .7rem}
.help-chips{display:flex;flex-wrap:wrap;gap:.45rem}
.chip{font-family:inherit;font-size:.82rem;font-weight:600;padding:.4rem .8rem;border-radius:2rem;background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);cursor:pointer}
.chip:hover{background:var(--accent-primary);color:#fff;border-color:var(--accent-primary)}
.ilink{color:var(--accent-primary);cursor:pointer;text-decoration:underline}

/* progress */
.progress-wrap{display:none;position:sticky;top:64px;z-index:50;background:var(--bg-primary);padding:.9rem 0 .5rem;margin:.4rem 0}
body.on-checklist .progress-wrap{display:block}
.progress-title{font-size:.92rem;font-weight:700;color:var(--text-primary);margin-bottom:.55rem;text-align:center}
.progress-track{height:14px;background:var(--bg-tertiary);border-radius:99px;overflow:hidden;border:1px solid var(--border-color)}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--warm),var(--accent-carrier));border-radius:99px;transition:width .45s cubic-bezier(.22,1,.36,1)}
.progress-foot{display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-top:.55rem}
.progress-label{font-size:.84rem;font-weight:600;color:var(--text-secondary)}
.restart-btn{font-family:inherit;font-size:.78rem;font-weight:600;padding:.3rem .7rem;border-radius:2rem;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;gap:.35rem;transition:all .2s}
.restart-btn:hover{border-color:var(--warm);color:var(--text-primary)}
.restart-btn svg{width:14px;height:14px}
.celebrate .restart-btn{margin-top:1.1rem;font-size:.9rem;padding:.6rem 1.4rem}

/* steps */
.step{display:flex;gap:.9rem;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:1rem;box-shadow:var(--card-shadow);padding:1.1rem 1.2rem;margin:.85rem 0;cursor:pointer;transition:border-color .2s,transform .12s,background .2s;align-items:flex-start}
.step:hover{border-color:var(--warm)}
.step:active{transform:scale(.995)}
.step.done{border-color:var(--accent-carrier)}
.checkbox{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:2.5px solid var(--border-color);display:flex;align-items:center;justify-content:center;transition:all .25s;margin-top:.1rem}
.checkbox svg{width:17px;height:17px;color:#fff;opacity:0;transform:scale(.4);transition:all .25s}
.step.done .checkbox{background:var(--accent-carrier);border-color:var(--accent-carrier)}
.step.done .checkbox svg{opacity:1;transform:scale(1)}
.step-body h3{font-size:1.02rem;font-weight:600}
.step.done .step-body h3{color:var(--text-secondary)}
.step-body .why{font-size:.88rem;color:var(--text-secondary);margin:.35rem 0}
.step-body .how{font-size:.85rem;color:var(--text-muted);background:var(--bg-tertiary);border-radius:.5rem;padding:.5rem .7rem;margin-top:.5rem}
.nudge{display:none;align-items:center;gap:.45rem;margin-top:.55rem;font-size:.82rem;color:var(--accent-warning);background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.35);border-radius:.5rem;padding:.45rem .65rem}
.nudge.show{display:flex;animation:fadeIn .2s ease-out}
.nudge svg{width:15px;height:15px;flex-shrink:0}

.reassure{display:flex;gap:.75rem;background:var(--bg-secondary);border:1px solid var(--border-color);border-left:4px solid var(--warm);border-radius:.8rem;padding:.9rem 1.1rem;margin:1.3rem 0;box-shadow:var(--card-shadow);font-size:.9rem;color:var(--text-secondary)}
.reassure svg{flex-shrink:0;width:20px;height:20px;color:var(--warm);margin-top:.15rem}

.celebrate{display:none;text-align:center;background:linear-gradient(180deg,rgba(16,185,129,.10),var(--bg-secondary));border:1px solid var(--accent-carrier);border-radius:1.2rem;box-shadow:var(--card-shadow);padding:2rem 1.4rem;margin:1.5rem 0}
.celebrate.show{display:block;animation:pop .5s cubic-bezier(.22,1.4,.4,1)}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.celebrate svg.big{width:60px;height:60px;color:var(--accent-carrier);margin-bottom:.5rem}
.celebrate h2{font-size:1.5rem;font-weight:700}
.celebrate p{color:var(--text-secondary);margin:.5rem auto 0;max-width:46ch}

footer{max-width:760px;margin:0 auto;padding:1.5rem 1.1rem 3rem;border-top:1px solid var(--border-color);color:var(--text-muted);font-size:.82rem;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#app{animation:fadeIn .25s ease-out}

/* guide drawer */
.guide-overlay{position:fixed;inset:0;z-index:2000;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
[data-theme="dark"] .guide-overlay{background:rgba(0,0,0,.6)}
.guide-overlay.open{display:flex;animation:fadeIn .2s ease-out}
.guide-sheet{background:var(--bg-secondary);width:100%;max-width:820px;height:90vh;border-radius:1.1rem 1.1rem 0 0;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -10px 40px rgba(0,0,0,.3);animation:sheetUp .3s cubic-bezier(.22,1,.36,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:760px){.guide-overlay{align-items:center}.guide-sheet{height:82vh;border-radius:1.1rem}}
.guide-bar{position:relative;display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.9rem 1rem .8rem;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)}
.guide-grab{position:absolute;top:.4rem;left:50%;transform:translateX(-50%);width:38px;height:4px;border-radius:99px;background:var(--border-color)}
@media(min-width:760px){.guide-grab{display:none}}
.guide-title{font-weight:700;font-size:.95rem;color:var(--text-primary)}
.guide-title small{display:block;font-size:.66rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.guide-close{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--border-color);background:var(--bg-secondary);font-size:1rem;line-height:1;cursor:pointer;color:var(--text-secondary)}
.guide-close:hover{background:var(--bg-primary);color:var(--text-primary)}
.guide-frame{flex:1;width:100%;border:none;background:var(--bg-secondary)}
</style>
</head>

<header>

<footer><span id="footer"></span></footer>

  /* ---------- state ---------- */
  var state={screen:'welcome', category:null, device:null, lang:'it'};
  var app=document.getElementById('app');

  function t(){return I18N[state.lang];}
  function devName(){return state.device?t().devices[state.device].name:'';}

  /* ---------- render ---------- */
  function render(){
    var s=state.screen;
    body.classList.toggle('on-checklist', s==='checklist');
    if(s==='welcome') app.innerHTML=viewWelcome();
    else if(s==='category') app.innerHTML=viewCategory();
    else if(s==='platform') app.innerHTML=viewPlatform();
    else if(s==='checklist'){ app.innerHTML=viewChecklist(); loadChecks(); }
    updateProgress();
    window.scrollTo({top:0});
  }

  function viewWelcome(){
    var w=t().welcome;
    return '<div class="hero">'
      +'<svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.5 8.5 2 5 5.4 5c2 0 3.3 1.1 4.1 2.3C10.3 6.1 11.6 5 13.6 5 17 5 18.5 8.5 17 11.7 14.5 16.4 12 21 12 21z"/></svg>'
      +'<h1>'+w.title+'</h1><p class="lead">'+w.lead+'</p></div>'
      +'<div class="intro-card"><p>'+w.p1+'</p><p class="why">'+w.why+'</p><p>'+w.p3+'</p></div>'
      +'<div class="start-row"><button class="start-btn" data-go="category">'+t().begin+'</button>'
      +'<div class="start-hint">'+w.hint+'</div></div>';
  }

  function backHead(target){
    return '<div class="screen-head"><button class="back-btn" data-go="'+target+'">'+IC.chevL+' '+t().back+'</button></div>';
  }

  function choiceCard(attr,val,icon,name,desc){
    return '<button class="choice" '+attr+'="'+val+'">'
      +'<span class="choice-ic">'+icon+'</span>'
      +'<span class="choice-tx"><b>'+name+'</b><small>'+desc+'</small></span>'
      +'<span class="choice-arrow">'+IC.chevR+'</span></button>';
  }

  function viewCategory(){
    var c=t().categories;
    return backHead('welcome')
      +'<h2 class="screen-title">'+t().chooseDevice+'</h2>'
      +'<p class="screen-sub">'+t().chooseDeviceSub+'</p>'
      +'<div class="choice-grid">'
      +choiceCard('data-cat','phone',catIcon('phone'),c.phone.name,c.phone.desc)
      +choiceCard('data-cat','laptop',catIcon('laptop'),c.laptop.name,c.laptop.desc)
      +choiceCard('data-cat','chromebook',catIcon('chromebook'),c.chromebook.name,c.chromebook.desc)
      +'</div>';
  }

  function viewPlatform(){
    var p=t().platforms;
    var opts = state.category==='phone' ? ['apple','android'] : ['windows','mac'];
    var title = state.category==='phone' ? t().choosePhone : t().chooseLaptop;
    var cards = opts.map(function(o){return choiceCard('data-device',o,platIcon(o),p[o].name,p[o].desc);}).join('');
    return backHead('category')+'<h2 class="screen-title">'+title+'</h2><div class="choice-grid">'+cards+'</div>';
  }

  function viewChecklist(){
    var dev=t().devices[state.device];
    var backTarget = state.category==='chromebook' ? 'category' : 'platform';
    var chips=dev.chips.map(function(c){return '<button class="chip" data-guide="'+c.g+'" data-label="'+c.l+'">'+c.l+'</button>';}).join('');
    var steps=dev.steps.map(function(s,i){
      return '<div class="step" data-step="'+i+'"><div class="checkbox">'+IC.check+'</div>'
        +'<div class="step-body"><h3>'+(i+1)+'. '+s.t+'</h3>'
        +'<p class="why">'+s.w+'</p>'
        +'<div class="how">'+s.h+'</div>'
        +'<div class="nudge">'+IC.warn+'<span>'+t().nudge+'</span></div></div></div>';
    }).join('');
    var cel=t().celebrate.replace('{device}',devName());
    return backHead(backTarget)
      +'<div class="help-card"><div class="h-title">'+IC.help+t().helpTitle+'</div>'
      +'<div class="h-sub">'+t().helpSub+'</div><div class="help-chips">'+chips+'</div></div>'
      +steps
      +'<div class="reassure">'+IC.info+'<div>'+t().reassure+'</div></div>'
      +'<div class="celebrate" id="celebrate">'+IC.checkBig+'<h2>'+t().allDone+'</h2><p>'+cel+'</p>'
      +'<button class="restart-btn" data-act="another">'+restartIcon()+t().startOver+'</button></div>';
  }
  function restartIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 2.6-6.4L3 8"/><path d="M3 3v5h5"/></svg>';}

  /* ---------- checks / progress ---------- */
  function checkKey(){return 'pcaudit-confirm-'+state.device;}
  function saveChecks(){
    var arr=[];app.querySelectorAll('[data-step]').forEach(function(s){arr.push(s.classList.contains('done')?1:0);});
    try{localStorage.setItem(checkKey(),JSON.stringify(arr));}catch(e){}
  }
  function loadChecks(){
    var arr=[];try{arr=JSON.parse(localStorage.getItem(checkKey())||'[]');}catch(e){}
    app.querySelectorAll('[data-step]').forEach(function(s,i){s.classList.toggle('done',arr[i]===1);});
  }
  function clearChecks(){try{localStorage.removeItem(checkKey());}catch(e){}}

  function updateNudges(){
    var priorMissing=false;
    app.querySelectorAll('[data-step]').forEach(function(s){
      var done=s.classList.contains('done');
      var n=s.querySelector('.nudge');
      if(n)n.classList.toggle('show',done&&priorMissing);
      if(!done)priorMissing=true;
    });
  }
  function updateProgress(){
    if(state.screen!=='checklist')return;
    var steps=app.querySelectorAll('[data-step]');
    var done=app.querySelectorAll('[data-step].done').length;
    var total=steps.length;
    document.getElementById('progress-fill').style.width=(total?Math.round(done/total*100):0)+'%';
    document.getElementById('progress-label').textContent=t().prog(done,total);
    document.getElementById('progress-title').textContent=t().recap.replace('{device}',devName());
    document.getElementById('restart-label').textContent=t().restart;
    var cel=document.getElementById('celebrate');
    if(cel)cel.classList.toggle('show',done===total&&total>0);
    updateNudges();
  }

  /* ---------- navigation ---------- */
  function go(screen){state.screen=screen;render();}
  function chooseCat(cat){
    state.category=cat;
    if(cat==='chromebook'){state.device='chromebook';state.screen='checklist';}
    else{state.device=null;state.screen='platform';}
    render();
  }
  function chooseDevice(dev){state.device=dev;state.screen='checklist';render();}
  function homeReset(){if(state.device)clearChecks();state.device=null;state.category=null;state.screen='welcome';render();}
  function anotherDevice(){if(state.device)clearChecks();state.device=null;state.category=null;state.screen='category';render();}

  /* ---------- events ---------- */
  app.addEventListener('click',function(e){
    var el;
    if(el=e.target.closest('[data-go]')){go(el.getAttribute('data-go'));return;}
    if(el=e.target.closest('[data-cat]')){chooseCat(el.getAttribute('data-cat'));return;}
    if(el=e.target.closest('[data-device]')){chooseDevice(el.getAttribute('data-device'));return;}
    if(el=e.target.closest('[data-act]')){if(el.getAttribute('data-act')==='another')anotherDevice();return;}
    if(el=e.target.closest('[data-guide]')){openGuide('pcaudit.html#'+state.lang+'-'+el.getAttribute('data-guide'),el.getAttribute('data-label')||'');return;}
    if(el=e.target.closest('[data-guide-full]')){openGuide('pcaudit.html',t().guideCap);return;}
    if(el=e.target.closest('[data-step]')){el.classList.toggle('done');saveChecks();updateProgress();return;}
  });
  document.querySelector('[data-act="home"]').addEventListener('click',homeReset);

  /* ---------- guide drawer ---------- */
  var overlay=document.getElementById('guide-overlay');
  var frame=document.getElementById('guide-frame');
  var gtitle=document.getElementById('guide-title');
  function scrollFrameTo(id){if(!id)return;try{var doc=frame.contentDocument;if(doc){var elx=doc.getElementById(id);if(elx)elx.scrollIntoView();}}catch(e){}}
  function openGuide(href,label){
    var id=(href.split('#')[1]||'');
    frame.onload=function(){scrollFrameTo(id);setTimeout(function(){scrollFrameTo(id);},180);setTimeout(function(){scrollFrameTo(id);},500);};
    frame.src=href;
    gtitle.innerHTML='<small>'+t().guideCap+'</small>'+(label||'');
    overlay.classList.add('open');body.style.overflow='hidden';
  }
  function closeGuide(){overlay.classList.remove('open');body.style.overflow='';setTimeout(function(){frame.src='about:blank';},280);}
  document.getElementById('guide-close').addEventListener('click',closeGuide);
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeGuide();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('open'))closeGuide();});

  /* ---------- language & theme ---------- */
  function setLang(l){
    state.lang=l;
    document.querySelectorAll('[data-langbtn]').forEach(function(x){x.classList.toggle('btn-primary',x.dataset.langbtn===l);});
    document.getElementById('footer').textContent=t().footer;
    root.lang=l;
    try{localStorage.setItem('pcaudit-confirm-lang',l);}catch(e){}
    render();
  }
  document.querySelectorAll('[data-langbtn]').forEach(function(x){x.addEventListener('click',function(){setLang(x.dataset.langbtn);});});

  var toggle=document.getElementById('theme-toggle');
  function setTheme(th){root.dataset.theme=th;toggle.textContent=th==='dark'?'☀️':'🌙';try{localStorage.setItem('pcaudit-theme',th);}catch(e){}}
  toggle.addEventListener('click',function(){setTheme(root.dataset.theme==='dark'?'light':'dark');});

  /* ---------- init ---------- */
  var sl='it',st='light';
  try{sl=localStorage.getItem('pcaudit-confirm-lang')||'it';st=localStorage.getItem('pcaudit-theme')||'light';}catch(e){}
  setTheme(st);
  setLang(sl);
})();
</script>
</body>
</html>
